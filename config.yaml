# ============================================================================
# subnetscope — Bittensor subnet directory & inspector (read-only)
# ============================================================================

network:
  subtensor_endpoint: "wss://entrypoint-finney.opentensor.ai:443"
  # Optional Taostats API key. Improves name/description coverage from ~40% to ~95%.
  # Same key as alphapilot — leave blank to skip enrichment and use on-chain only.
  taostats_api_key: ""

universe:
  # Hard exclude list (netuid integers).
  blacklist_netuids: []
  # If non-empty, only these netuids are scanned. Leave [] to scan ALL subnets.
  whitelist_netuids: []
  # Skip the root subnet (netuid 0) since it's not a normal pool.
  include_root: false

scan:
  # Max parallel SDK reads (each call is a websocket round-trip).
  concurrency: 5
  # Time between full refreshes in TUI mode (seconds).
  refresh_seconds: 90
  # If a subnet read fails, retry this many times then move on.
  retries_per_subnet: 2

categorize:
  # If true, manual overrides in `subnetscope/categories.json` win over keywords.
  use_overrides: true
  # If a subnet has no clean match, label it as this category.
  default_category: "other"

dashboard:
  # Default sort. Single key OR comma-separated multi-key spec with optional
  # :asc / :desc per key. Available keys:
  #   netuid, fee (alias: burn), demand, name, type, gpu, reward,
  #   top1, miners, gini, emission, liquidity, age,
  #   slots_used, slots_free, fullness (= used/max), price.
  #
  # Default below is tuned for "find the best subnet to mine on":
  #   1. lowest GPU need first (none > heavy)
  #   2. flattest reward distribution first (more chance to earn)
  #   3. most free UID slots first (less competition)
  #   4. cheapest burn fee first
  #   5. highest liquidity first (more stable AMM pool)
  #   6. highest emission first (more rewards)
  sort_by: "score:desc"
  # Other examples: "gpu:asc, reward:asc, slots_free:desc, fee:asc, liquidity:desc, emission:desc"
  # Keys: netuid, score, fee, demand, name, type, gpu, reward, top1, miners, gini,
  #       emission, liquidity, age, slots_used, slots_free, fullness, price.
  # Default direction for keys without an explicit :asc/:desc suffix above.
  sort_order: "asc"
  # Filter to only these categories (empty = show all).
  filter_types: []
  # Truncate descriptions to this many chars in the table.
  max_description_chars: 50

coldkeys:
  # READ-ONLY wallet directory for the dashboard "Wallet" modal.
  # Subnetscope NEVER reads private keys, mnemonics, or passwords.
  # Only the public SS58 address is queried (free TAO + per-subnet alpha
  # stake positions). It's safe to share this section.
  #
  # Tip: get a wallet's SS58 with:
  #   cat ~/.bittensor/wallets/<wallet_name>/coldkeypub.txt
  #
  # Cache TTL — how long balance/stake snapshots are reused before re-querying
  # the chain (one round-trip per refresh per coldkey).
  cache_ttl_seconds: 60
  # If true, the modal lets you paste any SS58 (handy for one-off lookups).
  # Set to false to restrict to the curated `entries` list below.
  allow_adhoc_lookup: true
  entries: 
  # Example entries — uncomment + replace with your own SS58s:
    - name: "ghostar"
      ss58: "5DkNFrYpD921PzE8uwqPsuZUovKk6ufmqDg7NoMyrj3ZbRCZ"
      note: "primary cold storage"
  #   - name: "ghostar"
  #     ss58: "5Gxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

hotkeys:
  # Optional: miner/validator hotkey SS58s to highlight on each SUBNET DETAIL page.
  # Also used for tempo-near 🔔 alerts: only subnets where at least one of these
  # hotkeys is registered (has a UID) can emit a tempo-near alert.
  # Shows registration + UID, then emission rank vs miners or validators (paid α/block),
  # pool share %, τ/day, incentive, trust — same basis as the "Miner reward distribution" table.
  # Tip: cat ~/.bittensor/wallets/<wallet>/hotkeys/<hk>/hotkeypub.txt
  # Example:
  entries:
    - name: "hot331"
