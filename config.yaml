      note: "SN33 miner"
    - name: "hot334"
      ss58: "5GePDiyBWxZK9gmJYon6qKsgtGppXt9gDdc6PzFQs2zoJA8p"
      note: "SN33 miner"
    - name: "hot335"
      ss58: "5HgG7WLrXmGZrCWnwXttjrdsWmBjaCdPxv8P2uaaMN89ZqDY"
      note: "SN33 miner"
